services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace/DARCHIE:cached
    command: sleep infinity
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/darchie
      REDIS_URL: redis://redis:6379/0
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: darchie
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
